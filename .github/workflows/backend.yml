name: backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  release:
    types: [published]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tidalwave
          POSTGRES_PASSWORD: tidalwave
          POSTGRES_DB: tidalwave
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tidalwave -d tidalwave"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    env:
      TIDALWAVE_TEST_DATABASE_URL: "postgresql+asyncpg://tidalwave:tidalwave@localhost:5432/tidalwave"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      # --locked macht Lock-Drift (pyproject geändert, Lock nicht) zum CI-Fehler.
      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy src

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          TIDALWAVE_DATABASE_URL: "postgresql+asyncpg://tidalwave:tidalwave@localhost:5432/tidalwave"

      - name: Run tests
        run: uv run pytest --tb=short -q

  image:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'release'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io verlangt lowercase repo-Paths; github.repository_owner
      # behält die Groß-/Kleinschreibung bei.
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Derive image version (strip leading v)
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tidalwave-backend:${{ env.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/tidalwave-backend:latest
